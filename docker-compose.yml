services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:8080
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
