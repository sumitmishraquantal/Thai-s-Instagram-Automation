server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_read_timeout 180s;
  }

  location /renders/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri /index.html;
  }
}